<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top 10 Songs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      color: #f5f5f5;
      min-height: 100vh;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(64, 64, 64, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(96, 96, 96, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 16px;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 16px;
      margin-bottom: 50px;
      font-weight: 300;
    }

    #status {
      text-align: center;
      margin-bottom: 30px;
      color: #999;
      font-size: 15px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: linear-gradient(145deg, #1f1f1f 0%, #161616 100%);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .card:hover::before {
      opacity: 1;
    }

    .image-wrapper {
      position: relative;
      margin-bottom: 20px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .rank {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 2;
    }

    .content {
      text-align: center;
    }

    .title {
      font-size: 19px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f5f5f5;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .artist {
      font-size: 15px;
      color: #a0a0a0;
      margin-bottom: 20px;
      font-weight: 400;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .buttons a {
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .buttons a::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .buttons a:hover::before {
      left: 100%;
    }

    .buttons a:hover {
      background: linear-gradient(135deg, #333 0%, #2a2a2a 100%);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
    }

    .buttons a.preview {
      background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
      color: #1a1a1a;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .buttons a.preview:hover {
      background: linear-gradient(135deg, #fff 0%, #f5f5f5 100%);
      box-shadow: 0 6px 16px rgba(255, 255, 255, 0.2);
    }

    .error {
      color: #ff6b6b;
      text-align: center;
      font-size: 18px;
      padding: 20px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(255, 107, 107, 0.2);
    }

    @media (max-width: 768px) {
      body {
        padding: 30px 15px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 20px;
      }

      h1 {
        margin-bottom: 12px;
      }

      .subtitle {
        margin-bottom: 40px;
      }
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Top 10 Songs</h1>
    <div class="subtitle">Découvrez les titres les plus populaires du moment</div>
    <div id="status">Chargement des chansons...</div>
    <div id="songs" class="grid"></div>
  </div>

  <script>
    async function loadSongs() {
      const status = document.getElementById("status");
      const songsContainer = document.getElementById("songs");

      try {
        const response = await fetch("/api/songs");

        if (!response.ok) {
          throw new Error("Erreur HTTP " + response.status);
        }

        const songs = await response.json();

        status.textContent = "";

        if (!songs.length) {
          status.textContent = "Aucune chanson trouvée.";
          return;
        }

        songsContainer.innerHTML = "";

        songs.forEach((song, index) => {
          const card = document.createElement("div");
          card.className = "card";
          card.style.animationDelay = `${index * 0.05}s`;

          card.innerHTML = `
            <div class="image-wrapper">
              <div class="rank">#${song.rank}</div>
              <img src="${song.image}" alt="${song.title}">
            </div>
            <div class="content">
              <div class="title">${song.title}</div>
              <div class="artist">${song.artist}</div>
              <div class="buttons">
                ${song.songLink ? `<a href="${song.songLink}" target="_blank">Écouter</a>` : ""}
                ${song.previewLink ? `<a class="preview" href="${song.previewLink}" target="_blank">Aperçu</a>` : ""}
              </div>
            </div>
          `;

          songsContainer.appendChild(card);
        });
      } catch (error) {
        status.innerHTML = `<div class="error">⚠️ Erreur de chargement: ${error.message}</div>`;
        console.error(error);
      }
    }

    loadSongs();
  </script>
</body>
</html>
